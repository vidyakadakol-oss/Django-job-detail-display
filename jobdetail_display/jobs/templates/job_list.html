<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>
</head>

<body>

<h1>Available Jobs</h1>

<ul>
{% for job in jobs %}
    <li>
        <h3>
            <a href="{% url 'job_detail' job.id %}">
                {{ job.title }}
            </a>
        </h3>

        <p><strong>Company:</strong> {{ job.company_name }}</p>
        <p><strong>Location:</strong> {{ job.location }}</p>

        <hr>
    </li>
{% endfor %}
</ul>

</body>
</html>
